<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الضغط</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    transition: background 1s ease;
    overflow: hidden;
    color: #fff;
    padding: 20px;
  }

 .stats {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 15px 40px;
    border-radius: 50px;
    display: flex;
    gap: 40px;
    font-size: 1.3rem;
    font-weight: 700;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    z-index: 10;
  }

 .stat-number {
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

 .game-container {
    position: relative;
    width: 100%;
    height: 60vh;
  }

 .click-btn {
    position: absolute;
    padding: 25px 50px;
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, #ff6b6b, #ff8e53);
    color: #fff;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    user-select: none;
  }

 .click-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 20px 45px rgba(0,0,0,0.5);
  }

 .click-btn:active {
    transform: scale(0.95);
  }

 .message {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    padding: 12px 30px;
    border-radius: 20px;
    font-size: 1.1rem;
    opacity: 0;
    transition: all 0.4s ease;
    pointer-events: none;
  }

 .message.show {
    opacity: 1;
    bottom: 50px;
  }

 .particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
  }

 .particle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #ffd700;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
  }

  @keyframes explode {
    from {
      opacity: 1;
      transform: translate(0, 0) scale(1);
    }
    to {
      opacity: 0;
      transform: translate(var(--tx), var(--ty)) scale(0);
    }
  }

 .level-up {
    animation: levelUp 0.8s ease;
  }

  @keyframes levelUp {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); filter: brightness(1.5); }
  }
</style>
</head>
<body>

<div class="stats">
  <div>الضغطات: <span class="stat-number" id="clicks">0</span></div>
  <div>المستوى: <span class="stat-number" id="level">1</span></div>
</div>

<div class="game-container" id="gameContainer">
  <button class="click-btn" id="clickBtn">اضغط عليا!</button>
</div>

<div class="message" id="message"></div>
<div class="particles" id="particles"></div>

<script>
  // تحميل البيانات من localStorage
  let clicks = parseInt(localStorage.getItem('clicks')) || 0;
  let level = parseInt(localStorage.getItem('level')) || 1;

  const clickBtn = document.getElementById('clickBtn');
  const clicksEl = document.getElementById('clicks');
  const levelEl = document.getElementById('level');
  const messageEl = document.getElementById('message');
  const particlesEl = document.getElementById('particles');

  // ألوان الخلفية لكل مستوى
  const backgrounds = [
    'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
    'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
    'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
    'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
    'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
    'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
    'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)'
  ];

  // تحديث العرض عند التحميل
  updateDisplay();
  moveButton();
  updateBackground();

  // حدث الضغط على الزر
  clickBtn.addEventListener('click', () => {
    clicks++;
    createParticles();

    // كل 5 ضغطات = مستوى جديد
    if (clicks % 5 === 0) {
      level++;
      showMessage(`🎉 مبروك! وصلت للمستوى ${level}`);
      moveButton();
      updateBackground();
      document.body.classList.add('level-up');
      setTimeout(() => document.body.classList.remove('level-up'), 800);
    } else {
      showMessage(`+1 ضغطة!`);
    }

    updateDisplay();
    saveData();
  });

  function updateDisplay() {
    clicksEl.textContent = clicks;
    levelEl.textContent = level;
  }

  function saveData() {
    localStorage.setItem('clicks', clicks);
    localStorage.setItem('level', level);
  }

  function moveButton() {
    const container = document.getElementById('gameContainer');
    const btnRect = clickBtn.getBoundingClientRect();
    const maxX = container.clientWidth - btnRect.width - 50;
    const maxY = container.clientHeight - btnRect.height - 50;

    const randomX = Math.random() * maxX + 25;
    const randomY = Math.random() * maxY + 25;

    clickBtn.style.left = randomX + 'px';
    clickBtn.style.top = randomY + 'px';
  }

  function updateBackground() {
    const bgIndex = (level - 1) % backgrounds.length;
    document.body.style.background = backgrounds[bgIndex];
  }

  function showMessage(text) {
    messageEl.textContent = text;
    messageEl.classList.add('show');
    setTimeout(() => messageEl.classList.remove('show'), 1500);
  }

  function createParticles() {
    const rect = clickBtn.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    for (let i = 0; i < 15; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = centerX + 'px';
      particle.style.top = centerY + 'px';
      particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
      particle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
      particlesEl.appendChild(particle);

      setTimeout(() => particle.remove(), 1000);
    }
  }

  // زر إعادة البداية بالضغط مرتين على العنوان
  let doubleClickTimer = null;
  document.querySelector('.stats').addEventListener('click', () => {
    if (doubleClickTimer === null) {
      doubleClickTimer = setTimeout(() => doubleClickTimer = null, 300);
    } else {
      clearTimeout(doubleClickTimer);
      doubleClickTimer = null;
      if (confirm('متأكد تريد إعادة البداية؟ كل التقدم غادي يتمسح!')) {
        clicks = 0;
        level = 1;
        saveData();
        updateDisplay();
        moveButton();
        updateBackground();
        showMessage('تم إعادة البداية 🔄');
      }
    }
  });
</script>

</body>
</html>
